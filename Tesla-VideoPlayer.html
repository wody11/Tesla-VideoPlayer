<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Tesla-VideoPlayer Standalone</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; min-height: 100dvh; overflow: hidden; }
    body { margin: 0; font-family: Arial, sans-serif; background: #0f1115; color: #e8ebf0; }
    .app { display: grid; grid-template-columns: minmax(0, 1fr) minmax(300px, 360px); width: 100%; height: 100dvh; max-height: 100dvh; gap: 0; overflow: hidden; }
    .stage { display: flex; flex-direction: column; min-width: 0; min-height: 0; height: 100%; overflow: hidden; border-right: 1px solid #252936; }
    #player { position: relative; flex: 1 1 auto; width: 100%; height: 100%; min-width: 0; min-height: 0; max-height: 100%; background: #000; overflow: hidden; }
    #player canvas { position: absolute !important; inset: 0; width: 100% !important; height: 100% !important; max-width: 100%; max-height: 100%; object-fit: contain; }
    .bar { flex: 0 0 auto; display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; background: #171a22; border-top: 1px solid #252936; }
    .panel { min-width: 0; min-height: 0; height: 100%; padding: 12px; overflow: auto; overscroll-behavior: contain; }
    label { display: block; font-size: 12px; color: #9ea7b8; margin: 10px 0 4px; }
    input, select, button { height: 32px; border-radius: 6px; border: 1px solid #303645; background: #11141b; color: #e8ebf0; padding: 0 8px; }
    input[type=text] { width: 100%; }
    button { cursor: pointer; background: #1d4ed8; border-color: #1d4ed8; }
    button.secondary { background: #202532; border-color: #303645; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    pre { margin: 0; padding: 10px; border: 1px solid #252936; background: #080a0f; border-radius: 6px; white-space: pre-wrap; font-size: 12px; }
    .log { min-height: 120px; max-height: 180px; overflow: auto; }
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; grid-template-rows: auto minmax(0, 1fr); height: 100dvh; min-height: 0; }
      .stage { height: auto; min-height: 0; border-right: 0; border-bottom: 1px solid #252936; }
      #player { flex: 0 0 auto; width: 100%; height: auto; aspect-ratio: 16 / 9; max-height: min(56dvh, calc(100dvh - 72px)); }
      .bar { flex-wrap: nowrap; overflow-x: auto; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
      .bar button { flex: 0 0 auto; }
      .panel { height: auto; min-height: 0; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
    }
    @media (max-width: 480px) {
      .row { grid-template-columns: 1fr; }
      .panel { padding: 10px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="stage">
      <div id="player"></div>
      <div class="bar">
        <button id="play">播放</button>
        <button id="pause" class="secondary">暂停</button>
        <button id="resume" class="secondary">恢复</button>
        <button id="stop" class="secondary">停止</button>
        <button id="fullscreen" class="secondary">全屏</button>
        <button id="shot" class="secondary">截图</button>
      </div>
    </main>
    <aside class="panel">
      <label>HTTP-FLV 地址</label>
      <input id="httpFlv" type="text" placeholder="https://example.com/live.flv">
      <label>WS-FLV 地址</label>
      <input id="wsFlv" type="text" placeholder="wss://example.com/live.flv">
      <label>m3u8 地址</label>
      <input id="hls" type="text" placeholder="https://example.com/live.m3u8">
      <label>MP4 地址</label>
      <input id="mp4" type="text" placeholder="https://example.com/video.mp4">
      <div class="row">
        <div>
          <label>播放源</label>
          <select id="source">
            <option value="http-flv">HTTP-FLV</option>
            <option value="ws-flv">WS-FLV</option>
            <option value="hls">m3u8</option>
            <option value="mp4">MP4</option>
          </select>
        </div>
        <div>
          <label>解码模式</label>
          <select id="decoder">
            <option value="auto">auto</option>
            <option value="webcodecs">webcodecs</option>
            <option value="wasm">wasm</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div>
          <label>渲染</label>
          <select id="renderer">
            <option value="webgl">webgl</option>
            <option value="canvas">canvas</option>
          </select>
        </div>
        <div>
          <label>音量</label>
          <input id="volume" type="range" min="0" max="1" step="0.01" value="1">
        </div>
      </div>
      <label>状态</label>
      <pre id="state">idle</pre>
      <label>标签数量</label>
      <pre id="tags">video=0 canvas=0</pre>
      <label>错误日志</label>
      <pre id="log" class="log"></pre>
      <label>Stats</label>
      <pre id="stats">{}</pre>
    </aside>
  </div>

  <script type="module">
    import { createTeslaPlayer } from './dist/index.js';

    const container = document.querySelector('#player');
    const state = document.querySelector('#state');
    const log = document.querySelector('#log');
    const stats = document.querySelector('#stats');
    const tags = document.querySelector('#tags');
    let player = createTeslaPlayer(container, {
      decoderMode: document.querySelector('#decoder').value,
      renderer: document.querySelector('#renderer').value,
      fitMode: 'contain',
      responsive: true,
      aspectRatio: 'video',
      maxViewportHeightRatio: 0.92
    });

    function appendLog(message) {
      log.textContent += `[${new Date().toLocaleTimeString()}] ${message}\n`;
      log.scrollTop = log.scrollHeight;
    }

    function bindEvents() {
      player.on('state', value => state.textContent = value);
      player.on('error', error => appendLog(error.message || String(error)));
      player.on('log', appendLog);
      player.on('firstFrame', ms => appendLog(`first frame ${ms}ms`));
    }

    function selectedUrl() {
      const source = document.querySelector('#source').value;
      const map = {
        'http-flv': '#httpFlv',
        'ws-flv': '#wsFlv',
        hls: '#hls',
        mp4: '#mp4'
      };
      return {
        sourceType: source,
        url: document.querySelector(map[source]).value.trim()
      };
    }

    bindEvents();

    document.querySelector('#play').onclick = async () => {
      const selected = selectedUrl();
      try {
        player.updateSettings({
          decoderMode: document.querySelector('#decoder').value,
          renderer: document.querySelector('#renderer').value
        });
        player.load(selected.url, { sourceType: selected.sourceType });
        await player.play();
      } catch (error) {
        appendLog(error.message || String(error));
      }
    };
    document.querySelector('#pause').onclick = () => player.pause();
    document.querySelector('#resume').onclick = () => player.resume();
    document.querySelector('#stop').onclick = () => player.stop();
    document.querySelector('#fullscreen').onclick = () => player.fullscreen();
    document.querySelector('#shot').onclick = () => {
      const url = player.screenshot();
      if (!url) return;
      const a = document.createElement('a');
      a.href = url;
      a.download = 'tesla-frame.png';
      a.click();
    };
    document.querySelector('#volume').oninput = event => player.setVolume(Number(event.target.value));

    setInterval(() => {
      tags.textContent = `video=${document.querySelectorAll('video').length} canvas=${document.querySelectorAll('canvas').length}`;
      state.textContent = player.getState();
      stats.textContent = JSON.stringify(player.getStats(), null, 2);
    }, 500);
  </script>
</body>
</html>
